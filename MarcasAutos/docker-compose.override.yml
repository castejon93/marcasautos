services:
  marcasautos.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_HTTP_PORTS=5000
      # - ASPNETCORE_HTTPS_PORTS=5001
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5000:5000"
      - "5001:5001"
    # Linux-based volume mounts for development
    # Add your Linux-specific volume mounts here if needed
    # Example: - ./secrets:/root/.aspnet/https:ro